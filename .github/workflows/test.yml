name: Test

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with: { go-version: stable }

    - name: Test
      run: go test -args -unsafe

    - name: Test native
      run: go test ./helpers ./internal/... ./libc-gen/...

    - name: Test 386
      run: GOARCH=386 GO386=sse2 go test ./helpers ./internal/...

    - name: Test riscv64
      run: GOARCH=riscv64 go test ./helpers ./internal/...

    - name: Test loong64
      run: GOARCH=loong64 go test ./helpers ./internal/...

    - name: Test ppc64le
      run: GOARCH=ppc64le go test ./helpers ./internal/...

    - name: Test mips64le
      run: GOARCH=mips64le go test ./helpers ./internal/...

    - name: Test mips64
      run: GOARCH=mips64 go test ./helpers ./internal/...

    - name: Test s390x
      run: GOARCH=s390x go test ./helpers ./internal/...

    - name: Test no optimization
      run: |
        go test -run translate -args -noopt
        go test ./internal/...

  test-arm:
    runs-on: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with: { go-version: stable }

    - name: Generate
      run: go generate

    - name: Format
      run: gofmt -s -w . && git diff --exit-code

    - name: Tidy
      run: go mod tidy && git diff --exit-code

    - name: Download
      run: go mod download

    - name: Verify
      run: go mod verify

    - name: Vet
      run: go vet

    - name: Test
      run: go test -args -unsafe

    - name: Test native
      run: go test ./helpers ./internal/... ./libc-gen/...

    - name: Test arm
      run: GOARCH=arm GOARM=7 go test ./helpers ./internal/...

    - name: Test no optimization
      run: |
        go test -run translate -args -noopt
        go test ./internal/...

  test-other:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04-riscv, ubuntu-24.04-s390x, ubuntu-24.04-ppc64le-p10]
    needs: test

    steps:
    - uses: actions/checkout@v6

    - name: Test
      run: go test -args -unsafe

    - name: Test native
      run: go test ./helpers ./internal/... ./libc-gen/...

    - name: Test no optimization
      run: |
        go test -run translate -args -noopt
        go test ./internal/...
